name: Update Dashboard Status

on:
  push:
    branches: [main]
  issues:
    types: [opened, closed, edited, labeled]
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate status snapshot
        run: |
          cat > data/status.json << EOF
          {
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "system": "operational",
            "version": "0.1.0"
          }
          EOF

      - name: Commit status update
        run: |
          git config user.name "proxy42bot"
          git config user.email "proxy@onemstudio.ai"
          git add data/status.json
          git diff --staged --quiet || git commit -m "chore: update system status snapshot [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
